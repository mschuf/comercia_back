# CI: valida cada PR y cada push a main (lint + tests + build de ambas apps).
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # postinstall de apps/api ejecuta `prisma generate`
      - name: Instalar dependencias
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Tests (API)
        run: npm run test

      # El build del front toma NEXT_PUBLIC_* de apps/web/.env.production
      - name: Build (API + Web)
        run: npm run build
